<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TÍTULO (aparece no Google) -->
    <title>PACK24 | Fornecimento de Bebidas para Negócios</title>

    <!-- DESCRIÇÃO (aparece no Google) -->
    <meta
      name="description"
      content="Distribuição de bebidas em packs de 24 unidades para cafés, bares e restaurantes. Entrega rápida na Costa da Caparica e Margem Sul. PACK24."
    />

    <!-- KEYWORDS (extra SEO) -->
    <meta
      name="keywords"
      content="bebidas, distribuição, packs 24, restaurantes, cafés, fornecedores bebidas, margem sul, pack24"
    />

    <!-- FAVICON (logo no browser/google) -->
    <link rel="icon" type="image/png" href="/images/logo.png" />

    <!-- OPEN GRAPH (quando partilhas link no WhatsApp/Instagram) -->
    <meta property="og:title" content="PACK24" />
    <meta
      property="og:description"
      content="Fornecimento de bebidas para o seu negócio com entrega rápida."
    />
    <meta property="og:image" content="https://pack24.pt/images/logo.png" />
    <meta property="og:url" content="https://pack24.pt" />
    <meta property="og:type" content="website" />

    <!-- CORES MOBILE -->
    <meta name="theme-color" content="#000000" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
